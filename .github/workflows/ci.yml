name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20 is active LTS and the vitest 4 / vite 8 toolchain floor (>=20.19); 24 is current.
        node-version: [20, 24]
    name: build-test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint # biome ci .

      - name: Build is reproducible (committed bundle up to date)
        run: pnpm run check:build # tsup && git diff --exit-code -- scripts/ultraeval.mjs

      - name: Test
        run: pnpm test

      - name: Smoke-run the committed bundle (init + plan generate a workflow)
        run: pnpm run demo # node scripts/ultraeval.mjs init ... && plan ...

      - name: Assert the eval run + generated workflow were produced
        run: test -f /tmp/ultraeval-demo/eval.config.json && test -f /tmp/ultraeval-demo/eval.workflow.mjs

      - name: Gate probe (grounding gate fails on a doctored artifact, passes on a genuine one)
        run: pnpm run eval # node evals/run.mjs

  install-bundle:
    runs-on: ubuntu-latest
    name: install-bundle (skill installs whole, not just SKILL.md)
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the embedded bundle
        run: pnpm run build

      - name: Verify the install-bundle shape (no root SKILL.md, engine in sync)
        run: pnpm run verify:bundle

      - name: End-to-end — `skills add` bundles the engine + references, not SKILL.md alone
        run: |
          WORK="$(mktemp -d)"
          cd "$WORK"
          npx --yes skills add "$GITHUB_WORKSPACE" --skill ultraeval --agent claude-code --copy -y
          DIR=.claude/skills/ultraeval
          test -f "$DIR/SKILL.md"               || { echo "::error::SKILL.md not installed"; exit 1; }
          test -f "$DIR/scripts/ultraeval.mjs"  || { echo "::error::engine not bundled — skills add dropped scripts/"; exit 1; }
          test -d "$DIR/references"             || { echo "::error::references/ not bundled"; exit 1; }
          node "$DIR/scripts/ultraeval.mjs" --help > /dev/null || { echo "::error::installed engine does not run"; exit 1; }
          echo "install-bundle: skill installed whole and the engine runs."

  # The shipped scripts/ultraeval.mjs is a dependency-free bundle that declares
  # engines.node ">=18", but the dev toolchain (vite 8 / vitest 4) needs Node
  # >=20.19 — so build-test above can't prove the floor. This job runs ONLY the
  # committed bundle on Node 18, with no install, to guarantee the published
  # ">=18" promise holds for the gate chain and the fix-doc generator.
  runtime-node-floor:
    runs-on: ubuntu-latest
    name: runtime (Node 18 floor, zero-dep bundle)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Grounding gate + TDD backlog generation run on Node 18
        run: |
          node scripts/ultraeval.mjs check --run tests/fixtures/sample-run
          node scripts/ultraeval.mjs verify --run tests/fixtures/sample-run --apply tests/fixtures/sample-run/verdicts.json
          node scripts/ultraeval.mjs check --run tests/fixtures/sample-run --semantic
          node scripts/ultraeval.mjs backlog --run tests/fixtures/sample-run --tdd --out "$RUNNER_TEMP/fixes"
          test -f "$RUNNER_TEMP/fixes/BACKLOG.json"
          test -f "$RUNNER_TEMP/fixes/REMEDIATION.md"
          node scripts/ultraeval.mjs render --run tests/fixtures/sample-run --out "$RUNNER_TEMP/fixes"
          test -f "$RUNNER_TEMP/fixes/index.md"
